name: Keep Render Awake

on:
  schedule:
    - cron: '*/14 * * * *' # Runs every 14 minutes
  workflow_dispatch: # Allows manual triggering

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend API
        run: |
          curl -f ${{ secrets.RENDER_BACKEND_URL }}/api/health || echo "Ping failed, but workflow continues."
