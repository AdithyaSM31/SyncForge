services:
  - type: web
    name: syncforge-backend
    env: node
    plan: free
    buildCommand: npm install --include=dev && cd server && npm install --include=dev && npx prisma generate && npx prisma db push && npm run build
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: REDIS_ENABLED
        value: "false"
      - key: DATABASE_URL
        value: "file:./data.db"
